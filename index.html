<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/UWg31rO.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/UWg31rO.png" />
    <title>SisteNext</title>
    <script>
      // Suppress benign Vite WebSocket errors that can cause unhandled rejections in sandboxed environments
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' || 
          (typeof event.reason.message === 'string' && event.reason.message.includes('[vite] failed to connect to websocket'))
        )) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
